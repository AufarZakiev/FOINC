services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: foinc
      POSTGRES_PASSWORD: foinc
      POSTGRES_DB: foinc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foinc"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
